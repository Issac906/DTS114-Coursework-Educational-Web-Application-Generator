<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Learning Path Generator</title>
  <style>
    :root { --ink:#20313a; --muted:#66727a; --line:#d9dfd6; --green:#1f7a5a; --blue:#2f5f9f; --gold:#e8b84f; --bg:#f5f7f2; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: var(--ink); background: var(--bg); }
    header { min-height: 360px; background: linear-gradient(90deg, rgba(20,41,48,.86), rgba(20,41,48,.48)), url('/static/ai-learning-hero.png') center/cover; color: white; display: flex; align-items: end; }
    .hero { width: min(1180px, 92vw); margin: 0 auto; padding: 48px 0; }
    h1 { margin: 0 0 14px; font-size: clamp(34px, 6vw, 64px); letter-spacing: 0; }
    .hero p { max-width: 720px; margin: 0; font-size: 18px; line-height: 1.6; }
    main { width: min(1180px, 92vw); margin: 28px auto 60px; display: grid; gap: 24px; }
    .toolbar, .planner, .results { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    .toolbar { display: grid; grid-template-columns: 1fr 180px 220px; gap: 12px; }
    input, select, textarea, button { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 11px 12px; font-size: 15px; }
    button { background: var(--green); color: white; border: 0; cursor: pointer; font-weight: 700; }
    button.secondary { background: var(--blue); }
    .layout { display: grid; grid-template-columns: 1.4fr .9fr; gap: 24px; align-items: start; }
    .courses { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; }
    .course { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 16px; min-height: 210px; display: flex; flex-direction: column; gap: 10px; }
    .course.selected { border-color: var(--green); box-shadow: inset 0 0 0 2px rgba(31,122,90,.18); }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 13px; color: var(--muted); }
    .tag { background: #eef4ed; border: 1px solid #d9e8dc; border-radius: 999px; padding: 4px 8px; }
    .planner { display: grid; gap: 12px; position: sticky; top: 16px; }
    .planner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .selected-list { color: var(--muted); min-height: 24px; }
    .week { border-top: 1px solid var(--line); padding: 12px 0; }
    .manual-item { background: #f8faf7; border: 1px solid var(--line); border-radius: 6px; padding: 10px; display: grid; gap: 4px; }
    .advice { white-space: pre-wrap; line-height: 1.6; }
    @media (max-width: 820px) { .toolbar, .layout, .planner-grid { grid-template-columns: 1fr; } .planner { position: static; } }
  </style>
</head>
<body>
  <header><div class="hero"><h1>AI Learning Planner</h1><p>Choose AI courses by difficulty and build a weekly study plan that matches your own goals.</p></div></header>
  <main>
    <section class="toolbar">
      <input id="search" placeholder="Search courses" />
      <select id="level"><option value="">All levels</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option><option>All Levels</option></select>
      <select id="category"><option value="">All categories</option></select>
    </section>
    <section class="layout">
      <div class="courses" id="courses"></div>
      <aside class="planner">
        <h2>Build Your Plan</h2>
        <div class="selected-list" id="selectedList">No courses selected.</div>
        <input id="name" placeholder="Student name" />
        <textarea id="goal" rows="2" placeholder="Your learning goal"></textarea>
        <button class="secondary" id="advice">Generate AI Suggestion</button>
        <div class="planner-grid"><input id="itemWeek" type="number" min="1" value="1" placeholder="Week" /><input id="itemHours" type="number" min="1" value="3" placeholder="Hours" /></div>
        <select id="itemCourse"><option value="">Select a chosen course</option></select>
        <textarea id="itemTask" rows="2" placeholder="Your task for this week"></textarea>
        <button id="addItem">Add Plan Item</button>
        <div id="manualItems"></div>
        <button id="generate">Save My Plan</button>
        <button class="secondary" id="clear">Clear Selection</button>
      </aside>
    </section>
    <section class="results" id="adviceResults"><h2>AI Study Suggestion</h2><p>Select courses and request an optional AI-generated suggestion.</p></section>
    <section class="results" id="results"><h2>Saved Plan</h2><p>Select courses and create your own weekly plan.</p></section>
  </main>
  <script>
    const state = { courses: [], selected: new Set(), manualEntries: [], savedPlanId: null };
    const $ = id => document.getElementById(id);
    async function loadCourses() {
      const res = await fetch('/api/courses');
      const data = await res.json();
      state.courses = data.courses;
      const categories = [...new Set(state.courses.map(c => c.category))].sort();
      $('category').innerHTML = '<option value="">All categories</option>' + categories.map(c => `<option>${c}</option>`).join('');
      renderCourses();
    }
    function renderCourses() {
      const search = $('search').value.toLowerCase();
      const level = $('level').value;
      const category = $('category').value;
      const courses = state.courses.filter(c => (!level || c.level === level) && (!category || c.category === category) && (!search || (c.title + c.description + c.skills.join(' ')).toLowerCase().includes(search)));
      $('courses').innerHTML = courses.map(c => `<article class="course ${state.selected.has(c.id) ? 'selected' : ''}"><h3>${c.title}</h3><div class="meta"><span class="tag">${c.level}</span><span class="tag">${c.category}</span><span class="tag">${c.weeks} weeks</span></div><p>${c.description}</p><div class="meta">${c.skills.map(s => `<span class="tag">${s}</span>`).join('')}</div><button onclick="toggleCourse('${c.id}')">${state.selected.has(c.id) ? 'Selected' : 'Select course'}</button></article>`).join('');
      renderSelected();
    }
    function toggleCourse(id) { state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id); renderCourses(); }
    function renderSelected() {
      const names = state.courses.filter(c => state.selected.has(c.id)).map(c => c.title);
      $('selectedList').textContent = names.length ? names.join(', ') : 'No courses selected.';
      $('itemCourse').innerHTML = '<option value="">Select a chosen course</option>' + state.courses.filter(c => state.selected.has(c.id)).map(c => `<option value="${c.id}">${c.title}</option>`).join('');
    }
    function renderManualItems() {
      $('manualItems').innerHTML = state.manualEntries.map((item, index) => `<div class="manual-item"><strong>Week ${item.week}: ${item.title}</strong><span>${item.hours} hours</span><span>${item.task}</span><button class="secondary" onclick="removeItem(${index})">Remove</button></div>`).join('');
    }
    function addItem() {
      const course = state.courses.find(c => c.id === $('itemCourse').value);
      if (!course || !$('itemTask').value.trim()) return;
      state.manualEntries.push({ course_id: course.id, title: course.title, week: Number($('itemWeek').value || 1), hours: Number($('itemHours').value || 1), task: $('itemTask').value.trim() });
      $('itemTask').value = '';
      renderManualItems();
    }
    function removeItem(index) { state.manualEntries.splice(index, 1); renderManualItems(); }
    async function savePlan() {
      const body = { course_ids: [...state.selected], manual_entries: state.manualEntries, student_profile: { name: $('name').value, goal: $('goal').value } };
      const res = await fetch('/api/plans', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { $('results').innerHTML = `<h2>Saved Plan</h2><p>${data.error}</p>`; return; }
      const plan = data.plan;
      state.savedPlanId = plan.id;
      $('results').innerHTML = `<h2>Saved Plan</h2><p><strong>Total planned time:</strong> ${plan.total_planned_hours} hours</p>${plan.weekly_plan.map(item => `<div class="week"><h3>Week ${item.week}: ${item.title}</h3><p>${item.hours} hours</p><p>${item.task}</p></div>`).join('')}<button id="submitAdvisor">Submit Plan to Academic Advisor</button><p id="submissionStatus"></p>`;
      $('submitAdvisor').addEventListener('click', submitToAdvisor);
    }
    async function submitToAdvisor() {
      if (!state.savedPlanId) return;
      const res = await fetch(`/api/plans/${state.savedPlanId}/submit`, { method: 'POST' });
      const data = await res.json();
      $('submissionStatus').textContent = res.ok ? data.message : data.error;
      if (res.ok) $('submitAdvisor').disabled = true;
    }
    async function requestAdvice() {
      const body = { course_ids: [...state.selected], student_profile: { name: $('name').value, goal: $('goal').value } };
      $('adviceResults').innerHTML = '<h2>AI Study Suggestion</h2><p>Generating suggestion...</p>';
      const res = await fetch('/api/advice', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { $('adviceResults').innerHTML = `<h2>AI Study Suggestion</h2><p>${data.error}</p>`; return; }
      $('adviceResults').innerHTML = `<h2>AI Study Suggestion</h2><p><strong>Source:</strong> ${data.source} (${data.model})</p><div class="advice">${data.advice}</div>`;
    }
    $('search').addEventListener('input', renderCourses);
    $('level').addEventListener('change', renderCourses);
    $('category').addEventListener('change', renderCourses);
    $('addItem').addEventListener('click', addItem);
    $('generate').addEventListener('click', savePlan);
    $('advice').addEventListener('click', requestAdvice);
    $('clear').addEventListener('click', () => { state.selected.clear(); state.manualEntries = []; renderCourses(); renderManualItems(); });
    loadCourses();
  </script>
</body>
</html>
